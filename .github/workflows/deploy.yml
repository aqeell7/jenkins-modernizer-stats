jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout your dashboard code
      - name: Checkout Dashboard Repository
        uses: actions/checkout@v4
        with:
          path: dashboard-code

      # 2. Checkout the massive Jenkins data repository right next to it
      - name: Checkout Jenkins Data Repository
        uses: actions/checkout@v4
        with:
          repository: jenkins-infra/metadata-plugin-modernizer
          path: metadata-plugin-modernizer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard-code/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard-code
        run: npm ci

      # 3. Build the app (this triggers our new script, processing all 400+ plugins instantly)
      - name: Compile Data and Build Vite App
        working-directory: ./dashboard-code
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard-code/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4